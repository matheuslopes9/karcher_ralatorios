version: '3.8'

services:
  # ══════════════════════════════════
  # POSTGRESQL
  # ══════════════════════════════════
  postgres:
    image: postgres:15-alpine
    container_name: karcher-postgres
    environment:
      POSTGRES_DB: karcher_analytics
      POSTGRES_USER: karcher
      POSTGRES_PASSWORD: karcher
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - karcher-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karcher"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ══════════════════════════════════
  # REDIS
  # ══════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: karcher-redis
    command: redis-server --requirepass karcher_redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - karcher-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ══════════════════════════════════
  # BACKEND (Golang)
  # ══════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: karcher-backend
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - karcher-network
    volumes:
      - ./backend/migrations:/root/migrations
      - export_data:/tmp/exports
    restart: unless-stopped

  # ══════════════════════════════════
  # FRONTEND (Next.js)
  # ══════════════════════════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: karcher-frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - karcher-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  export_data:

networks:
  karcher-network:
    driver: bridge
